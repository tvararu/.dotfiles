services:
  comfyui-api:
    container_name: comfyui-api
    image: ghcr.io/saladtechnologies/comfyui-api:comfy0.12.3-api1.17.1-torch2.8.0-cuda12.8-runtime
    restart: unless-stopped
    ports:
      - "8188:8188"
      - "8300:8300"
    extra_hosts:
      - "openclaw:100.91.68.60"
    volumes:
      - ~/srv/comfyui-api/cache:/root/.cache/comfyui-api
      - ~/srv/comfyui-api/output:/opt/ComfyUI/output
      - ~/srv/comfyui-api/manifest.yml:/manifest.yml:ro
      - ~/srv/comfyui-api/startup.sh:/startup.sh:ro
      - ~/models:/opt/ComfyUI/models
    entrypoint: ["/bin/bash", "/startup.sh"]
    environment:
      - MANIFEST=/manifest.yml
      - PORT=8300
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  transmission:
    container_name: transmission
    image: linuxserver/transmission:4.0.5
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/srv/transmission/config:/config
      - ~/downloads:/downloads
      - ~/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - USER=${TRANSMISSION_USER}
      - PASS=${TRANSMISSION_PASS}

  jellyfin:
    container_name: jellyfin
    image: linuxserver/jellyfin:latest
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ~/srv/jellyfin:/config
      - ~/media:/data/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  jellyfin-vue:
    container_name: jellyfin-vue
    image: ghcr.io/jellyfin/jellyfin-vue:unstable
    restart: unless-stopped
    ports:
      - "8099:80"

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARED_TOKEN}
    networks:
      - kamal

  aitoolkit:
    container_name: aitoolkit
    image: ostris/aitoolkit:latest
    restart: unless-stopped
    shm_size: "16gb"
    ports:
      - "8675:8675"
    volumes:
      - ~/srv/aitoolkit/hf-cache:/root/.cache/huggingface
      - ~/srv/aitoolkit/aitk_db.db:/app/ai-toolkit/aitk_db.db
      - ~/srv/aitoolkit/datasets:/app/ai-toolkit/datasets
      - ~/srv/aitoolkit/output:/app/ai-toolkit/output
      - ~/srv/aitoolkit/config:/app/ai-toolkit/config
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  kamal:
    external: true
