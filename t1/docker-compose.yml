services:
  comfyui:
    container_name: comfyui
    image: mmartial/comfyui-nvidia-docker:ubuntu24_cuda13.1-latest
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - ~/srv/comfyui:/comfy/mnt
      - ~/models:/host_models
    environment:
      - WANTED_UID=1000
      - WANTED_GID=1000
      - USE_UV=true
      - FORCE_CHOWN=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  transmission:
    container_name: transmission
    image: linuxserver/transmission:4.0.5
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/srv/transmission/config:/config
      - ~/downloads:/downloads
      - ~/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - USER=${TRANSMISSION_USER}
      - PASS=${TRANSMISSION_PASS}

  jellyfin:
    container_name: jellyfin
    image: linuxserver/jellyfin:latest
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ~/srv/jellyfin:/config
      - ~/media:/data/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  jellyfin-vue:
    container_name: jellyfin-vue
    image: ghcr.io/jellyfin/jellyfin-vue:unstable
    restart: unless-stopped
    ports:
      - "8099:80"

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARED_TOKEN}
    networks:
      - kamal

  aitoolkit:
    container_name: aitoolkit
    image: ostris/aitoolkit:latest
    restart: unless-stopped
    shm_size: "16gb"
    ports:
      - "8675:8675"
    volumes:
      - ~/srv/aitoolkit/hf-cache:/root/.cache/huggingface
      - ~/srv/aitoolkit/aitk_db.db:/app/ai-toolkit/aitk_db.db
      - ~/srv/aitoolkit/datasets:/app/ai-toolkit/datasets
      - ~/srv/aitoolkit/output:/app/ai-toolkit/output
      - ~/srv/aitoolkit/config:/app/ai-toolkit/config
    environment:
      - NODE_ENV=production
      - TZ=Asia/Bangkok
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Qwopus 27B dense, Claude-distilled. Manual start: docker compose up -d llama-qwopus
  llama-qwopus:
    container_name: llama-qwopus
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    profiles: ["qwopus"]
    ports:
      - "100.73.138.96:8001:8001"
    volumes:
      - ~/srv/llama-server/cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -hf Jackrong/Qwopus3.6-27B-v2-MTP-GGUF:Q4_K_M
      -ngl 99 -fa on --parallel 1 --no-mmproj
      --host 0.0.0.0 --port 8001
      --spec-type draft-mtp --spec-draft-n-max 6
      --temp 1.0 --top-p 0.95

  # Qwen3.6 35B-A3B MoE, fast. Manual start: docker compose up -d llama-qwen36-a3b
  # (stop llama-qwopus first — both bind port 8001 and can't share VRAM)
  llama-qwen36-a3b:
    container_name: llama-qwen36-a3b
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    profiles: ["a3b"]
    ports:
      - "100.73.138.96:8001:8001"
    volumes:
      - ~/srv/llama-server/cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -hf unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q4_K_XL
      -ngl 99 -fa on --parallel 1 --no-mmproj
      --host 0.0.0.0 --port 8001
      --spec-type draft-mtp --spec-draft-n-max 6
      --temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.00 --presence-penalty 1.5

networks:
  kamal:
    external: true
